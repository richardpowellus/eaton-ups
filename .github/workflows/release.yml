name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build -ldflags="-s -w" -o eaton-ups.exe .

      - name: Create release zip
        run: Compress-Archive -Path eaton-ups.exe, setup.ps1, README.md, LICENSE -DestinationPath eaton-ups-windows-amd64.zip

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: eaton-ups-windows-amd64.zip
          generate_release_notes: true
